<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OficinaTech - Página Inicial</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
</head>
<body class="home-page">
    <div class="logo-section">
        <img src="logo.png" alt="Logo OficinaTech" class="logo-image">
    </div>
    <h1 class="site-title">Sistema de gestão OficinaTech</h1>
    <!-- MAIN CONTENT -->
    <main class="container-main home-page">
        <section class="cards-section">
            <h2 class="cards-title">Selecione uma área para acessar</h2>
            <div class="cards-grid">
                <button class="nav-item" onclick="navegarPara('dashboard')">
                    <div class="nav-item-content">
                        <div class="nav-item-icon dashboard-icon">
                            <i class="fas fa-chart-line"></i>
                        </div>
                        <div class="nav-item-text">
                            <h3>Dashboard</h3>
                            <p>Visualize métricas e estatísticas em tempo real</p>
                        </div>
                        <div class="nav-item-arrow">
                            <i class="fas fa-arrow-right"></i>
                        </div>
                    </div>
                </button>

                <button class="nav-item" onclick="navegarPara('clientes')">
                    <div class="nav-item-content">
                        <div class="nav-item-icon clientes-icon">
                            <i class="fas fa-users"></i>
                        </div>
                        <div class="nav-item-text">
                            <h3>Clientes</h3>
                            <p>Gerencie informações e histórico de clientes</p>
                        </div>
                        <div class="nav-item-arrow">
                            <i class="fas fa-arrow-right"></i>
                        </div>
                    </div>
                </button>

                <button class="nav-item" onclick="navegarPara('veiculos')">
                    <div class="nav-item-content">
                        <div class="nav-item-icon veiculos-icon">
                            <i class="fas fa-car-side"></i>
                        </div>
                        <div class="nav-item-text">
                            <h3>Veículos</h3>
                            <p>Cadastro e acompanhamento de veículos</p>
                        </div>
                        <div class="nav-item-arrow">
                            <i class="fas fa-arrow-right"></i>
                        </div>
                    </div>
                </button>

                <button class="nav-item" onclick="navegarPara('ordens')">
                    <div class="nav-item-content">
                        <div class="nav-item-icon ordens-icon">
                            <i class="fas fa-file-invoice"></i>
                        </div>
                        <div class="nav-item-text">
                            <h3>Ordens de Serviço</h3>
                            <p>Crie e acompanhe ordens de serviço</p>
                        </div>
                        <div class="nav-item-arrow">
                            <i class="fas fa-arrow-right"></i>
                        </div>
                    </div>
                </button>

                <button class="nav-item" onclick="navegarPara('pecas')">
                    <div class="nav-item-content">
                        <div class="nav-item-icon pecas-icon">
                            <i class="fas fa-cogs"></i>
                        </div>
                        <div class="nav-item-text">
                            <h3>Peças</h3>
                            <p>Controle de estoque e catálogo de peças</p>
                        </div>
                        <div class="nav-item-arrow">
                            <i class="fas fa-arrow-right"></i>
                        </div>
                    </div>
                </button>

                <button class="nav-item" onclick="navegarPara('historico')">
                    <div class="nav-item-content">
                        <div class="nav-item-icon historico-icon">
                            <i class="fas fa-history"></i>
                        </div>
                        <div class="nav-item-text">
                            <h3>Histórico</h3>
                            <p>Consulte histórico completo de serviços</p>
                        </div>
                        <div class="nav-item-arrow">
                            <i class="fas fa-arrow-right"></i>
                        </div>
                    </div>
                </button>
            </div>
        </section>
    </main>
    <script>
        function navegarPara(secao) {
            // Redireciona para o index.html e carrega a seção desejada
            window.location.href = 'index.html?secao=' + secao;
        }
    </script>
    <script src="app.js"></script>
</body>
</html>
